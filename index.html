<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wisy — Visual Design Studio</title>
  <meta name="description" content="Wisy — a parametric visual design studio for websites, desktop apps, and audio software UIs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/app.css" />
  <link rel="stylesheet" href="./styles/widgets.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235b8cff'/><path d='M7 11l3 11 3-8 3 8 3-11' stroke='white' stroke-width='2.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
</head>
<body>
  <div id="app" class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar__group topbar__brand">
        <div class="brand">
          <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="var(--accent)"></rect>
            <path d="M7 11l3 11 3-8 3 8 3-11" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span class="brand__name">Wisy</span>
        </div>
        <div class="topbar__doctitle">
          <input id="doc-title" class="doctitle-input" value="Untitled Project" aria-label="Project title" />
        </div>
        <div class="topbar__file">
          <button class="btn btn--ghost" id="btn-new" title="New project"><svg viewBox="0 0 24 24" class="ic"><path d="M14 3v5h5M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M12 12v5M9.5 14.5h5"/></svg></button>
          <button class="btn btn--ghost" id="btn-open" title="Open project (.wisy.json)"><svg viewBox="0 0 24 24" class="ic"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
          <button class="btn btn--ghost" id="btn-save" title="Save project file"><svg viewBox="0 0 24 24" class="ic"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg></button>
          <input type="file" id="open-input" accept=".json,application/json" hidden />
        </div>
      </div>

      <div class="topbar__group topbar__center">
        <div class="viewport-switch" role="tablist" aria-label="Responsive viewport">
          <button class="vp-btn is-active" data-viewport="desktop" title="Desktop" aria-label="Desktop">
            <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>
          </button>
          <button class="vp-btn" data-viewport="tablet" title="Tablet" aria-label="Tablet">
            <svg viewBox="0 0 24 24" class="ic"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M11 18h2"/></svg>
          </button>
          <button class="vp-btn" data-viewport="mobile" title="Mobile" aria-label="Mobile">
            <svg viewBox="0 0 24 24" class="ic"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/></svg>
          </button>
        </div>
        <select id="device-select" class="device-select" title="Device preset" aria-label="Device preset"></select>
        <div class="zoom-ctl">
          <button class="zoom-btn" id="zoom-out" title="Zoom out (Cmd -)" aria-label="Zoom out"><svg viewBox="0 0 24 24" class="ic"><path d="M5 12h14"/></svg></button>
          <button class="zoom-readout" id="zoom-val" title="Reset to 100% (Cmd 0)">100%</button>
          <button class="zoom-btn" id="zoom-in" title="Zoom in (Cmd +)" aria-label="Zoom in"><svg viewBox="0 0 24 24" class="ic"><path d="M12 5v14M5 12h14"/></svg></button>
          <button class="zoom-btn" id="zoom-fit" title="Fit (Cmd 1)" aria-label="Fit to screen"><svg viewBox="0 0 24 24" class="ic"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
        </div>
      </div>

      <div class="topbar__group topbar__actions">
        <button class="btn btn--ghost" id="btn-undo" title="Undo (Ctrl/Cmd+Z)" aria-label="Undo">
          <svg viewBox="0 0 24 24" class="ic"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
        </button>
        <button class="btn btn--ghost" id="btn-redo" title="Redo (Ctrl/Cmd+Shift+Z)" aria-label="Redo">
          <svg viewBox="0 0 24 24" class="ic"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h3"/></svg>
        </button>
        <span class="topbar__divider"></span>
        <button class="btn btn--ghost btn--icon" id="btn-wizard" title="Start wizard" aria-label="Start wizard">
          <svg viewBox="0 0 24 24" class="ic"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"/></svg>
        </button>
        <button class="btn btn--ghost btn--icon" id="btn-theme" title="Theme editor" aria-label="Theme editor">
          <svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18 3 3 0 0 0 0-6 1.5 1.5 0 0 1 0-3 3 3 0 0 0 0-6z"/></svg>
        </button>
        <button class="btn btn--ghost" id="btn-try" title="Try it — interactive preview (Esc to exit)">
          <svg viewBox="0 0 24 24" class="ic"><path d="M5 3l14 9-14 9z"/></svg>
          <span>Try</span>
        </button>
        <button class="btn btn--ghost btn--icon" id="btn-preview" title="Preview in new tab" aria-label="Preview">
          <svg viewBox="0 0 24 24" class="ic"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="btn btn--ghost btn--icon" id="btn-code" title="View generated code" aria-label="View code">
          <svg viewBox="0 0 24 24" class="ic"><path d="M8 9l-4 3 4 3"/><path d="M16 9l4 3-4 3"/><path d="M13 6l-2 12"/></svg>
        </button>
        <button class="btn btn--primary" id="btn-export" title="Export site">
          <svg viewBox="0 0 24 24" class="ic"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 21h14"/></svg>
          <span>Export</span>
        </button>
      </div>
    </header>

    <!-- Body: left rail | canvas | inspector -->
    <main class="body">
      <!-- Left rail -->
      <aside class="rail rail--left">
        <nav class="rail__tabs" role="tablist">
          <button class="rail-tab is-active" data-panel="insert" title="Insert">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button class="rail-tab" data-panel="layers" title="Layers">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>
          </button>
          <button class="rail-tab" data-panel="pages" title="Pages">
            <svg viewBox="0 0 24 24" class="ic"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
          </button>
          <button class="rail-tab" data-panel="templates" title="Templates">
            <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
        </nav>
        <div class="rail__content">
          <section class="panel is-active" data-panel="insert" id="panel-insert"></section>
          <section class="panel" data-panel="layers" id="panel-layers"></section>
          <section class="panel" data-panel="pages" id="panel-pages"></section>
          <section class="panel" data-panel="templates" id="panel-templates"></section>
        </div>
      </aside>

      <!-- Canvas -->
      <section class="stage-wrap" id="stage-wrap">
        <div class="stage-scroll" id="stage-scroll">
          <div class="stage-sizer" id="stage-sizer">
            <div class="stage-frame" id="stage-frame">
              <iframe id="stage" class="stage" title="Design canvas"></iframe>
            </div>
            <div class="overlay" id="overlay" aria-hidden="true"></div>
          </div>
        </div>
        <div class="stage-empty" id="stage-empty" hidden>
          <div class="stage-empty__inner">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 5v14M5 12h14"/></svg>
            <h3>Start designing</h3>
            <p>Drag a component from the left, or pick a template.</p>
          </div>
        </div>
      </section>

      <!-- Inspector -->
      <aside class="rail rail--right">
        <div class="inspector" id="inspector"></div>
      </aside>
    </main>
  </div>

  <!-- Code / export modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel">
      <header class="modal__head">
        <h2 id="modal-title">Generated code</h2>
        <div class="modal__tabs" id="code-tabs">
          <button class="ctab is-active" data-code="html">index.html</button>
          <button class="ctab" data-code="css">styles.css</button>
          <button class="ctab" data-code="js">app.js</button>
        </div>
        <button class="btn btn--ghost" data-close aria-label="Close">
          <svg viewBox="0 0 24 24" class="ic"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>
      <div class="modal__body">
        <pre class="code-view"><code id="code-out"></code></pre>
      </div>
      <footer class="modal__foot">
        <button class="btn btn--ghost" id="btn-copy-code">Copy</button>
        <button class="btn btn--primary" id="btn-download-zip">Download project</button>
      </footer>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
